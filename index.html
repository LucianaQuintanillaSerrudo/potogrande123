<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* Estilo opcional para un indicador de carga */
      #scanning-overlay {
        display: flex; align-items: center; justify-content: center;
        position: absolute; left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(0,0,0,0.5); color: white; z-index: 2;
      }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: yes;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="miFoto" src="presentacion.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: ${customFields.libVersion}; objects: .clickable"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-image src="yo.JPG"
                 position="0 0.4 0.1" 
                 width="1" 
                 height="1"
                 animation="property: position; to: 0 0.45 0.1; dir: alternate; dur: 2000; loop: true">
        </a-image>
        
        <a-plane color="#1a1a1a" opacity="0.8" position="0 -0.3 0" width="1.2" height="0.5"></a-plane>

        <a-text value="Luciana Quintanilla\nDiseno Digital y UX\nModelado 3D | Blender" 
                color="white" 
                align="center" 
                width="1.1" 
                position="0 -0.3 0.05">
        </a-text>

      </a-entity>
    </a-scene>

  </body>
</html>
